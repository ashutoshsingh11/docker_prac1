version: '3.9'

services:
  # ── Backend: Node/Express API ──────────────────────────
  backend:
    build: ./backend          # Build image from backend/Dockerfile
    container_name: backend
    ports:
      - "3001:3001"           # host:container port mapping
    networks:
      - app-network

  # ── Frontend: Vite + React ─────────────────────────────
  frontend:
    build: ./frontend         # Build image from frontend/Dockerfile
    container_name: frontend
    ports:
      - "5173:5173"           # host:container port mapping
    depends_on:
      - backend               # Start backend first
    networks:
      - app-network

# Shared network so containers can talk to each other by name
networks:
  app-network:
    driver: bridge
