- name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          password: ${{ secrets.EC2_PASSWORD }}   # ← use password instead of key
          script: |
            cd ~/docker_prac1
            git pull origin main
            docker compose up --build -d
            docker image prune -f
